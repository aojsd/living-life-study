<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Living Life Study</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container" x-data="quiz">

    <!-- Main Menu -->
    <template x-if="screen === 'menu'">
      <div class="menu-screen">
        <h1>Living Life Study</h1>
        <p class="subtitle">Practice test for fill-in-the-blank questions, true/false, and Bible memory verses.</p>
        <div class="menu-grid">
          <article class="menu-card" @click="startSection('fitb')">
            <h3>Fill in the Blank</h3>
            <p>11 questions with multiple parts</p>
            <small>55 points</small>
          </article>
          <article class="menu-card" @click="startSection('tf')">
            <h3>True or False</h3>
            <p>106 statements</p>
            <small>106 points</small>
          </article>
          <article class="menu-card" @click="startSection('verses_text')">
            <h3>Verses</h3>
            <p>12 verses: type verse from reference</p>
            <small>12 points</small>
          </article>
          <article class="menu-card" @click="startSection('verses_ref')">
            <h3>References</h3>
            <p>12 verses: type reference from verse</p>
            <small>12 points</small>
          </article>
          <article class="menu-card" @click="startSection('verses_hard')">
            <h3>Verses (Hard)</h3>
            <p>12 verses: recall both reference and text from memory</p>
            <small>12 points</small>
          </article>
          <article class="menu-card menu-card-full" @click="startSection('full')">
            <h3>Full Test</h3>
            <p>All sections in order</p>
            <small>185 points</small>
          </article>
        </div>
      </div>
    </template>

    <!-- Quiz Screen -->
    <template x-if="screen === 'quiz'">
      <div class="quiz-screen" @keydown.enter.window="if(!(currentSectionType === 'tf' && !submitted[currentIndex])) handleSubmitOrNext()">
        <header class="quiz-header">
          <div class="quiz-header-left">
            <span class="section-badge" x-text="currentSectionLabel()"></span>
            <span class="progress-text" x-text="'Question ' + (currentIndex + 1) + ' of ' + currentQuestions.length"></span>
          </div>
          <button class="outline secondary btn-sm" @click="confirmQuit()">Quit</button>
        </header>

        <!-- Progress bar -->
        <progress :value="currentIndex + 1" :max="currentQuestions.length"></progress>

        <!-- Fill in the Blank -->
        <template x-if="currentSectionType === 'fitb'">
          <article class="question-card">
            <h3 x-text="'Q' + (currentIndex + 1) + '. ' + currentQ().question"></h3>
            <p class="points-label" x-text="currentQ().points + ' points'"></p>
            <!-- Paired layout (name + range side by side) -->
            <template x-if="currentQ().paired">
              <div class="paired-parts">
                <template x-for="i in Math.ceil(currentQ().parts.length / 2)" :key="i">
                  <div class="pair-row">
                    <template x-for="pi in [((i-1)*2), ((i-1)*2+1)]" :key="pi">
                      <template x-if="currentQ().parts[pi]">
                        <div class="part-row pair-cell" :class="partFeedbackClass(pi)">
                          <label x-text="currentQ().parts[pi].label"></label>
                          <input type="text"
                            :value="answers[currentIndex]?.[pi] || ''"
                            @input="answers[currentIndex] = answers[currentIndex] || []; answers[currentIndex][pi] = $event.target.value"
                            :disabled="submitted[currentIndex]"
                            :placeholder="submitted[currentIndex] ? '' : 'Your answer...'"
                          >
                          <template x-if="submitted[currentIndex] && feedback[currentIndex]?.[pi] === false">
                            <small class="correction" x-text="'Answer: ' + currentQ().parts[pi].answer"></small>
                          </template>
                        </div>
                      </template>
                    </template>
                  </div>
                </template>
              </div>
            </template>

            <!-- Standard single-column layout -->
            <template x-if="!currentQ().paired">
              <div>
                <template x-for="(part, pi) in currentQ().parts" :key="pi">
                  <div class="part-row" :class="partFeedbackClass(pi)">
                    <label x-text="part.label"></label>
                    <input type="text"
                      :value="answers[currentIndex]?.[pi] || ''"
                      @input="answers[currentIndex] = answers[currentIndex] || []; answers[currentIndex][pi] = $event.target.value"
                      :disabled="submitted[currentIndex]"
                      :placeholder="submitted[currentIndex] ? '' : 'Your answer...'"
                    >
                    <template x-if="submitted[currentIndex] && feedback[currentIndex]?.[pi] === false">
                      <small class="correction" x-text="'Answer: ' + part.answer"></small>
                    </template>
                  </div>
                </template>
              </div>
            </template>
            <div class="question-actions">
              <button @click="submitAnswer()" x-show="!submitted[currentIndex]">Submit</button>
              <button @click="nextQuestion()" x-show="submitted[currentIndex]">
                <span x-text="isLastQuestion() ? 'Finish Section' : 'Next'"></span>
              </button>
            </div>
          </article>
        </template>

        <!-- True or False -->
        <template x-if="currentSectionType === 'tf'">
          <article class="question-card">
            <h3 x-text="'Q' + (currentIndex + 1) + '.'"></h3>
            <p class="tf-statement" x-text="currentQ().statement"></p>
            <div class="tf-buttons" x-show="!submitted[currentIndex]">
              <button class="outline" @click="answers[currentIndex] = true; submitAnswer()">True</button>
              <button class="outline" @click="answers[currentIndex] = false; submitAnswer()">False</button>
            </div>
            <template x-if="submitted[currentIndex]">
              <div class="tf-result" :class="feedback[currentIndex] ? 'correct' : 'incorrect'">
                <span x-text="feedback[currentIndex] ? 'Correct!' : 'Incorrect — Answer: ' + (currentQ().answer ? 'True' : 'False')"></span>
              </div>
            </template>
            <div class="question-actions">
              <button @click="nextQuestion()" x-show="submitted[currentIndex]">
                <span x-text="isLastQuestion() ? 'Finish Section' : 'Next'"></span>
              </button>
            </div>
          </article>
        </template>

        <!-- Verses: type verse from reference -->
        <template x-if="currentSectionType === 'verses_text'">
          <article class="question-card">
            <h3 x-text="'Verse ' + (currentIndex + 1)"></h3>
            <p class="verse-reference" x-text="currentQ().reference"></p>

            <!-- Hint display -->
            <template x-if="verseHints[currentIndex] && verseHints[currentIndex].length > 0 && !submitted[currentIndex]">
              <div class="verse-hints">
                <template x-for="(hw, wi) in verseHints[currentIndex]" :key="wi">
                  <span :class="hw.revealed ? 'hint-word revealed' : 'hint-word blank'" x-text="hw.revealed ? hw.word : '____'"></span>
                </template>
              </div>
            </template>

            <template x-if="!submitted[currentIndex]">
              <p class="hint-tip" x-text="hintsRemaining() > 0 ? 'Submit blank for a hint (' + hintsRemaining() + ' remaining)' : 'No hints remaining — submit your answer'"></p>
            </template>

            <textarea
              :value="answers[currentIndex] || ''"
              @input="answers[currentIndex] = $event.target.value"
              :disabled="submitted[currentIndex]"
              rows="4"
              placeholder="Type the full verse..."
              @keydown.enter.prevent
            ></textarea>

            <!-- Word-by-word feedback after submit -->
            <template x-if="submitted[currentIndex]">
              <div class="verse-feedback">
                <template x-for="(w, wi) in verseFeedback[currentIndex]" :key="wi">
                  <span :class="w.correct ? 'word-correct' : 'word-incorrect'"
                    x-text="w.correct ? w.word : w.expected"
                    :title="!w.correct && w.got ? ('You wrote: ' + w.got) : ''"></span>
                </template>
              </div>
            </template>

            <div class="question-actions">
              <button @click="submitAnswer()" x-show="!submitted[currentIndex]">Submit</button>
              <button @click="nextQuestion()" x-show="submitted[currentIndex]">
                <span x-text="isLastQuestion() ? 'Finish Section' : 'Next'"></span>
              </button>
            </div>
          </article>
        </template>

        <!-- Verses: type reference from verse text -->
        <template x-if="currentSectionType === 'verses_ref'">
          <article class="question-card">
            <h3 x-text="'Verse ' + (currentIndex + 1)"></h3>
            <p class="verse-prompt-text">"<span x-text="currentQ().text"></span>"</p>
            <label>Reference:</label>
            <input type="text"
              :value="answers[currentIndex] || ''"
              @input="answers[currentIndex] = $event.target.value"
              :disabled="submitted[currentIndex]"
              placeholder="e.g. John 3:16"
            >
            <template x-if="submitted[currentIndex]">
              <div class="tf-result" :class="feedback[currentIndex] ? 'correct' : 'incorrect'">
                <span x-text="feedback[currentIndex] ? 'Correct!' : 'Incorrect — Answer: ' + currentQ().reference"></span>
              </div>
            </template>
            <div class="question-actions">
              <button @click="submitAnswer()" x-show="!submitted[currentIndex]">Submit</button>
              <button @click="nextQuestion()" x-show="submitted[currentIndex]">
                <span x-text="isLastQuestion() ? 'Finish Section' : 'Next'"></span>
              </button>
            </div>
          </article>
        </template>

      </div>
    </template>

    <!-- Verses Hard Screen -->
    <template x-if="screen === 'verses_hard'">
      <div class="quiz-screen">
        <header class="quiz-header">
          <div class="quiz-header-left">
            <span class="section-badge">Verses (Hard)</span>
            <span class="progress-text">Write all 12 references and verses from memory</span>
          </div>
          <button class="outline secondary btn-sm" @click="if(confirm('Quit? Progress will be lost.')) { screen = 'menu'; resetAll(); }">Quit</button>
        </header>

        <template x-for="(v, i) in currentQuestions" :key="i">
          <article class="question-card hard-card">
            <!-- Before submit or graded/wrong rows -->
            <template x-if="!hardFeedback || hardFeedback[i].status === 'graded' || hardFeedback[i].status === 'wrong'">
              <div>
                <h4>
                  <span x-text="'Verse ' + (i + 1)"></span>
                  <template x-if="hardFeedback && hardFeedback[i].status === 'wrong'">
                    <span class="hard-status-wrong"> — Incorrect</span>
                  </template>
                </h4>
                <div class="hard-verse-row">
                  <div class="hard-ref" :class="hardFeedback ? (hardFeedback[i].ref ? 'part-correct' : 'part-incorrect') : ''">
                    <label>Reference:</label>
                    <input type="text"
                      :value="hardAnswers[i]?.ref || ''"
                      @input="hardAnswers[i].ref = $event.target.value"
                      :disabled="hardSubmitted"
                      placeholder="e.g. John 3:16"
                    >
                    <template x-if="hardFeedback && !hardFeedback[i].ref && hardFeedback[i].matchedVerse">
                      <small class="correction" x-text="'Answer: ' + hardFeedback[i].matchedVerse.reference"></small>
                    </template>
                  </div>
                  <div class="hard-text" :class="hardFeedback ? (hardFeedback[i].text ? 'part-correct' : 'part-incorrect') : ''">
                    <label>Verse:</label>
                    <textarea
                      :value="hardAnswers[i]?.text || ''"
                      @input="hardAnswers[i].text = $event.target.value"
                      :disabled="hardSubmitted"
                      rows="3"
                      placeholder="Type the full verse..."
                    ></textarea>
                    <template x-if="hardFeedback && !hardFeedback[i].text && hardFeedback[i].wordFeedback.length > 0">
                      <div class="verse-feedback">
                        <template x-for="(w, wi) in hardFeedback[i].wordFeedback" :key="wi">
                          <span :class="w.correct ? 'word-correct' : 'word-incorrect'"
                            x-text="w.correct ? w.word : w.expected"
                            :title="!w.correct && w.got ? ('You wrote: ' + w.got) : ''"></span>
                        </template>
                      </div>
                    </template>
                  </div>
                </div>
              </div>
            </template>

            <!-- Duplicate row -->
            <template x-if="hardFeedback && hardFeedback[i].status === 'duplicate'">
              <div>
                <h4><span x-text="'Verse ' + (i + 1)"></span><span class="hard-status-wrong"> — Duplicate</span></h4>
                <p class="hard-duplicate-msg">This verse was already submitted in another row.</p>
              </div>
            </template>

            <!-- Blank row — just reveal the unattempted verse -->
            <template x-if="hardFeedback && hardFeedback[i].status === 'blank'">
              <div>
                <h4><span x-text="'Verse ' + (i + 1)"></span><span class="hard-status-blank"> — Not attempted</span></h4>
                <template x-if="hardFeedback[i].matchedVerse">
                  <div class="hard-reveal">
                    <strong x-text="hardFeedback[i].matchedVerse.reference"></strong>
                    <p x-text="hardFeedback[i].matchedVerse.text"></p>
                  </div>
                </template>
              </div>
            </template>
          </article>
        </template>

        <div class="question-actions">
          <button @click="submitAllVersesHard()" x-show="!hardSubmitted">Submit All</button>
          <button @click="finishVersesHard()" x-show="hardSubmitted">See Results</button>
        </div>
      </div>
    </template>

    <!-- Results Screen -->
    <template x-if="screen === 'results'">
      <div class="results-screen">
        <h1>Results</h1>

        <template x-for="section in resultSections" :key="section.type">
          <article class="results-section">
            <header>
              <h3 x-text="section.label"></h3>
              <span class="score-badge" x-text="section.earned + ' / ' + section.total"></span>
            </header>

            <!-- Wrong answers list -->
            <template x-if="section.wrong.length > 0">
              <div class="wrong-list">
                <h4>Incorrect Answers:</h4>
                <template x-for="item in section.wrong" :key="item.id">
                  <div class="wrong-item">
                    <template x-if="section.type === 'fitb'">
                      <div>
                        <strong x-text="'Q' + item.id + ': ' + item.question"></strong>
                        <template x-for="(p, pi) in item.wrongParts" :key="pi">
                          <div class="wrong-part">
                            <span class="wrong-label" x-text="p.label + ':'"></span>
                            <span class="wrong-yours" x-text="'Yours: ' + (p.yours || '(blank)')"></span>
                            <span class="wrong-correct" x-text="'Answer: ' + p.answer"></span>
                          </div>
                        </template>
                      </div>
                    </template>
                    <template x-if="section.type === 'tf'">
                      <div>
                        <strong x-text="item.statement"></strong>
                        <div>
                          <span class="wrong-yours" x-text="'Yours: ' + (item.yours ? 'True' : 'False')"></span>
                          <span class="wrong-correct" x-text="'Answer: ' + (item.answer ? 'True' : 'False')"></span>
                        </div>
                      </div>
                    </template>
                    <template x-if="section.type === 'verses_text' || section.type === 'verses_ref' || section.type === 'verses_hard'">
                      <div>
                        <strong x-text="item.reference"></strong>
                        <div class="wrong-verse-text" x-text="'Answer: ' + item.text"></div>
                      </div>
                    </template>
                  </div>
                </template>
              </div>
            </template>
            <template x-if="section.wrong.length === 0">
              <p class="all-correct">All correct!</p>
            </template>
          </article>
        </template>

        <!-- Overall -->
        <article class="overall-score">
          <h2>Overall: <span x-text="totalEarned + ' / ' + totalPossible"></span></h2>
          <p x-text="Math.round(totalEarned / totalPossible * 100) + '%'"></p>
        </article>

        <button @click="screen = 'menu'; resetAll()">Back to Menu</button>
      </div>
    </template>

  </main>

  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
